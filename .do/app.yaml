name: mandala-coloring-landing
static_sites:
  - name: web
    environment_slug: html
    source_dir: /
    github:
      repo: DamienBell/mandala-coloring-landing
      branch: main
      deploy_on_push: true
ingress:
  rules:
    # /m/* → serve m/index.html (catch-all for Universal Link landing pages)
    - match:
        path:
          prefix: /m/
      component:
        name: web
        rewrite: /m/index.html
    # Default: serve all other paths (/, /.well-known/, /assets/, etc.) as-is
    - match:
        path:
          prefix: /
      component:
        name: web
